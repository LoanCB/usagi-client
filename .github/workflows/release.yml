name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS-arm64
          - os: windows-latest
            name: Windows-x64
          - os: ubuntu-22.04
            name: Linux-x64

    runs-on: ${{ matrix.os }}

    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            libglib2.0-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Set version from git tag
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          # MSI requires numeric-only pre-release identifiers (≤ 65535).
          # Strip non-numeric pre-release suffixes (e.g. -beta, -beta.1) so the
          # build succeeds on Windows; the tag/release name still conveys beta status.
          if [[ "$VERSION" =~ -[^0-9] ]]; then
            VERSION="${VERSION%%-*}"
          fi
          jq --arg version "$VERSION" '.version = $version' src-tauri/tauri.conf.json > tmp.json
          mv tmp.json src-tauri/tauri.conf.json

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Generate Linux updater artifacts
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle/appimage"
          APPIMAGE=$(find "$BUNDLE_DIR" -name "*.AppImage" ! -name "*.tar.gz" 2>/dev/null | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "::warning::No AppImage found — skipping Linux updater artifact"
            exit 0
          fi
          TARBALL="${APPIMAGE}.tar.gz"
          if [ ! -f "$TARBALL" ]; then
            echo "Creating $(basename "$TARBALL")"
            (cd "$BUNDLE_DIR" && tar -czf "$(basename "$TARBALL")" "$(basename "$APPIMAGE")")
          fi
          if [ ! -f "${TARBALL}.sig" ]; then
            echo "Signing $(basename "$TARBALL")"
            pnpm tauri signer sign "$TARBALL"
          fi

      - name: Generate Windows updater artifacts
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $nsisDir = "src-tauri/target/release/bundle/nsis"
          $exe = Get-ChildItem "$nsisDir/*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            Write-Warning "No NSIS installer found — skipping Windows updater artifact"
            exit 0
          }
          $zipName = $exe.FullName -replace '\.exe$', '.nsis.zip'
          if (-not (Test-Path $zipName)) {
            Write-Output "Creating $(Split-Path -Leaf $zipName)"
            Compress-Archive -Path $exe.FullName -DestinationPath $zipName
          }
          if (-not (Test-Path "$zipName.sig")) {
            Write-Output "Signing $(Split-Path -Leaf $zipName)"
            pnpm tauri signer sign $zipName
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bunly-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.zip
            src-tauri/target/release/bundle/msi/*.msi.zip.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/release/bundle/appimage/*.AppImage.tar.gz.sig
          if-no-files-found: warn

  create-updater-manifest:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      - name: Generate latest.json
        env:
          TAG: ${{ github.ref_name }}
          GITHUB_REPO: LoanCB/usagi-client
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const tag = process.env.TAG;
          const version = process.env.TAG.replace(/^v/, '');
          const repo = process.env.GITHUB_REPO;
          const baseUrl = `https://github.com/${repo}/releases/download/${tag}`;

          function walkDir(dir) {
            const results = [];
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) results.push(...walkDir(full));
              else results.push(full);
            }
            return results;
          }

          const allFiles = walkDir('artifacts');
          console.log('All files:', allFiles);

          function find(suffix) {
            return allFiles.find(f => f.endsWith(suffix)) ?? null;
          }

          function readSig(suffix) {
            const f = find(suffix);
            if (!f) throw new Error(`Missing signature: ${suffix}`);
            return fs.readFileSync(f, 'utf8').trim();
          }

          const manifest = {
            version,
            notes: '',
            pub_date: new Date().toISOString(),
            platforms: {},
          };

          const macTar = find('.app.tar.gz');
          if (macTar) {
            manifest.platforms['darwin-aarch64'] = {
              url: `${baseUrl}/${path.basename(macTar)}`,
              signature: readSig('.app.tar.gz.sig'),
            };
          }

          const linuxTar = find('.AppImage.tar.gz');
          if (linuxTar) {
            manifest.platforms['linux-x86_64'] = {
              url: `${baseUrl}/${path.basename(linuxTar)}`,
              signature: readSig('.AppImage.tar.gz.sig'),
            };
          }

          const winZip = find('.nsis.zip') ?? find('.msi.zip');
          if (winZip) {
            const sigSuffix = winZip.endsWith('.nsis.zip') ? '.nsis.zip.sig' : '.msi.zip.sig';
            manifest.platforms['windows-x86_64'] = {
              url: `${baseUrl}/${path.basename(winZip)}`,
              signature: readSig(sigSuffix),
            };
          }

          if (Object.keys(manifest.platforms).length === 0) {
            throw new Error('No platforms found in artifacts — check upload paths in build job');
          }

          fs.writeFileSync('latest.json', JSON.stringify(manifest, null, 2));
          console.log('Generated latest.json:\n' + JSON.stringify(manifest, null, 2));
          EOF

      - name: Upload updater manifest
        uses: actions/upload-artifact@v4
        with:
          name: updater-manifest
          path: latest.json
          if-no-files-found: error

  release:
    needs: [build, create-updater-manifest]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine release type
        id: release_type
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [[ "$TAG" == *"-beta"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "release_name=Pre-release $TAG (unstable)" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "release_name=Release $TAG" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_type.outputs.release_name }}
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          generate_release_notes: true
          files: artifacts/**/*
